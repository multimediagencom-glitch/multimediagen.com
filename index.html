// --- PROCESSING ---
const premiumNames = new Set(["RJ Opu", "Abu Sayeed Mohammad Nafi", "Ashik Ahamed", "Sheikh Nusrat Priya", "Niyaz Afridi", "Moumita Debnath", "Fahad Abdullah Al Azad", "Nahar Barna", "Tahsin Hossain Rahi", "Raika Rowshan Oishy", "Habiba", "Eshrat Jahan Disha", "Reya Rahman", "Md Usman Gani"]);
rawPromoters.forEach(p => { p.isTopRanked = premiumNames.has(p.name); });
rawPromoters.sort((a, b) => {
  const pushToEnd = ["Asraf Ahmed", "Sabrina Tanjin Tanfe"];
  const aToEnd = pushToEnd.indexOf(a.name); const bToEnd = pushToEnd.indexOf(b.name);
  if (aToEnd !== -1 && bToEnd !== -1) return aToEnd - bToEnd;
  if (aToEnd !== -1) return 1; if (bToEnd !== -1) return -1;
  const forcedOrder = ["RJ Opu", "Abu Sayeed Mohammad Nafi", "Ashik Ahamed"];
  const aIndex = forcedOrder.indexOf(a.name); const bIndex = forcedOrder.indexOf(b.name);
  if (aIndex !== -1 && bIndex !== -1) return aIndex - bIndex;
  if (aIndex !== -1) return -1; if (bIndex !== -1) return 1;
  if (b.isTopRanked !== a.isTopRanked) return b.isTopRanked - a.isTopRanked;
  return b.rating - a.rating;
});

rawPromoters.forEach((p, index) => {
  let rank = index + 1;
  p.id = "MG-BP-" + String(rank).padStart(2, '0');
  if (rank <= 14) { p.badgeText = "TOP RATED"; p.badgeClass = "top-rated"; } 
  else if (rank <= 24) { p.badgeText = "LEVEL 2 SELLER"; p.badgeClass = "level-2"; } 
  else if (rank <= 34) { p.badgeText = "LEVEL 1 SELLER"; p.badgeClass = "level-1"; } 
  else { p.badgeText = "NEW SELLER"; p.badgeClass = "new-seller"; }
});

voiceArtists.sort((a, b) => b.rating - a.rating);
voiceArtists.forEach((a, index) => {
  let rank = index + 1;
  if (rank <= 6) { a.badgeText = "TOP RATED"; a.badgeClass = "top-rated"; } 
  else if (rank <= 11) { a.badgeText = "LEVEL 2 SELLER"; a.badgeClass = "level-2"; } 
  else if (rank <= 15) { a.badgeText = "LEVEL 1 SELLER"; a.badgeClass = "level-1"; } 
  else { a.badgeText = "NEW SELLER"; a.badgeClass = "new-seller"; }
});

// --- RENDER LOGIC ---
let pFilter = 'all';
let vFilter = 'all';

function renderStars(r){
  let s = '';
  for(let i=1;i<=5;i++) s += i<=r ? '<i class="fas fa-star"></i>' : (i-0.5===r ? '<i class="fas fa-star-half-alt"></i>' : '<i class="far fa-star"></i>');
  return s;
}

const getDemoLink = (d, t='d') => {
  if(!t || typeof t === 'undefined') return d.startsWith('http') ? d : `https://drive.google.com/drive/folders/${d}`;
  return t === 'd' ? `https://drive.google.com/drive/folders/${d}` : t === 'y' ? `https://youtu.be/${d}` : d;
}

function renderGrid(arr, filterVal, containerId, searchInputId, isVoice) {
  const q = document.getElementById(searchInputId).value.toLowerCase();
  const filtered = arr.filter(item => 
    (item.name ? item.name : item.n).toLowerCase().includes(q) || 
    (item.id ? item.id : item.i).toLowerCase().includes(q)
  );

  const finalFilter = filtered.filter(item => {
    if (filterVal === 'all') return true;
    const itemGender = item.gender ? item.gender : item.g;
    if (filterVal === 'male' || filterVal === 'female') return itemGender === filterVal;
    return item.badgeClass === filterVal;
  });

  document.getElementById(containerId).innerHTML = finalFilter.map(item => {
    const name = item.name ? item.name : item.n;
    const id = item.id ? item.id : item.i;
    const video = item.video ? item.video : item.v;
    const typeLabel = isVoice ? 'Voice Artist' : 'Brand Promoter';
    
    const msg = encodeURIComponent(`Hello Multimedia Gen!\nI am interested in booking this ${typeLabel}:\nName: ${name}\nID: ${id}\n\nPlease share the package details.`);
    const wa = `https://wa.me/8801915706375?text=${msg}`;
    const demoLink = getDemoLink(item.demo || item.d, item.t);
    
    return `<div class="card is-${item.badgeClass}">
      <div class="i">
        <div class="badge ${item.badgeClass}">${item.badgeText}</div>
        <h2>${name}</h2>
        <div class="id">${id}</div>
        <div class="rating">${renderStars(item.rating)} <span>${item.rating.toFixed(1)}</span></div>
        <div class="v" onclick="window.playVideo(this,'${video}')">
          <img src="https://i.ytimg.com/vi_webp/${video}/hqdefault.webp" loading="lazy" width="320" height="180" alt="${name}">
          <div class="p"><i class="fas fa-play"></i></div>
        </div>
        <div class="b">
          <div class="top-buttons">
            <a href="${demoLink}" target="_blank" rel="noopener">${isVoice ? 'LISTEN AUDIO' : 'PORTFOLIO'}</a>
          </div>
          <a href="${wa}" target="_blank" rel="noopener" class="wa"><i class="fab fa-whatsapp"></i> Reserve on WhatsApp</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

// --- GLOBALS & EVENTS ---
window.playVideo = function(el, id){
  const isPlaying = el.classList.contains('playing');
  document.querySelectorAll('.v.playing').forEach(v => {
    v.classList.remove('playing');
    const iframe = v.querySelector('iframe');
    if(iframe) iframe.remove();
  });
    
  if(!isPlaying){
    const iframe = document.createElement('iframe');
    iframe.setAttribute('allow', 'autoplay; fullscreen');
    iframe.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;
    el.appendChild(iframe);
    el.classList.add('playing');
  }
}

window.switchTab = function(tabId) {
  document.querySelectorAll('.mt-btn').forEach(b => b.classList.remove('active'));
  event.target.closest('.mt-btn').classList.add('active');
  
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tabId).classList.add('active');

  document.querySelectorAll('.v.playing iframe').forEach(ifr => ifr.remove());
  document.querySelectorAll('.v.playing').forEach(v => v.classList.remove('playing'));
}

document.querySelectorAll('#f-promoter button').forEach(b => b.addEventListener('click', (e) => {
  document.querySelectorAll('#f-promoter button').forEach(x => x.classList.remove('active'));
  e.target.classList.add('active');
  pFilter = e.target.dataset.f;
  renderGrid(rawPromoters, pFilter, 'grid-promoter', 's-promoter', false);
}));

document.querySelectorAll('#f-voice button').forEach(b => b.addEventListener('click', (e) => {
  document.querySelectorAll('#f-voice button').forEach(x => x.classList.remove('active'));
  e.target.classList.add('active');
  vFilter = e.target.dataset.f;
  renderGrid(voiceArtists, vFilter, 'grid-voice', 's-voice', true);
}));

document.getElementById('s-promoter').addEventListener('input', () => renderGrid(rawPromoters, pFilter, 'grid-promoter', 's-promoter', false));
document.getElementById('s-voice').addEventListener('input', () => renderGrid(voiceArtists, vFilter, 'grid-voice', 's-voice', true));

renderGrid(rawPromoters, 'all', 'grid-promoter', 's-promoter', false);
renderGrid(voiceArtists, 'all', 'grid-voice', 's-voice', true);
</script>
