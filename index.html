<style>
/* --- MINIFIED & OPTIMIZED CSS --- */
:root{--g:#00ff88;--gold:#ffd700;--cyn:#00f2ff;--purp:#bc13fe;--w:#fff;--d:#0d1116;--bg:#06080a;--gray:#94a3b8;--bdr:#1f2937}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,-apple-system,sans-serif}
body{background:var(--bg);color:var(--w);overflow-x:hidden}

/* FIXED HEADER OVERLAP: Increased top padding to 120px */
.c{max-width:1400px;margin:auto;padding:120px 15px 80px;text-align:center}

h1{font-size:clamp(2.5rem,8vw,5.5rem);font-weight:900;letter-spacing:-2px;background:linear-gradient(115deg,#fff,var(--g),#00f2ff);-webkit-background-clip:text;color:transparent;margin-bottom:10px;line-height:1}
.sub{font-size:clamp(.95rem,2.5vw,1.2rem);color:var(--gray);font-weight:600;letter-spacing:2px;margin-bottom:30px;text-transform:uppercase}
.s{position:relative;max-width:500px;margin:0 auto 25px}
.s input{width:100%;padding:14px 20px 14px 50px;background:#11161d;border:1px solid var(--bdr);border-radius:40px;color:#fff;font-size:1rem;outline:0;transition:.3s;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.s input:focus{border-color:var(--g);box-shadow:0 0 20px rgba(0,255,136,.15);background:#161d26}
.s i{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:var(--g);font-size:1.2rem}
.f{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:30px}
.f button{padding:10px 18px;background:0 0;border:1px solid var(--bdr);color:var(--gray);border-radius:30px;font-size:.8rem;font-weight:700;cursor:pointer;transition:.3s}
.f button.active,.f button:hover{background:var(--g);color:#000;border-color:var(--g);box-shadow:0 0 15px rgba(0,255,136,.3)}
.guide-box{background:rgba(0,255,136,.05);border:1px solid rgba(0,255,136,.2);border-radius:16px;padding:15px 20px;margin:0 auto 40px;max-width:800px;display:flex;align-items:flex-start;gap:15px;text-align:left;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.guide-box i{color:var(--g);font-size:1.5rem;margin-top:3px}
.guide-box p{font-size:.9rem;color:var(--gray);margin:0;line-height:1.6;letter-spacing:.5px}
.guide-box b,.guide-box strong{color:var(--w)}
#g{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.card{background:var(--d);border-radius:20px;position:relative;border:1px solid var(--bdr);transition:.4s;display:flex;flex-direction:column;overflow:hidden;will-change:transform}
.card:hover{transform:translateY(-8px);box-shadow:0 15px 40px rgba(0,0,0,.6)}
.badge{display:inline-flex;align-self:flex-start;padding:5px 12px;border-radius:20px;font-size:.7rem;font-weight:900;letter-spacing:1px;margin-bottom:12px;text-transform:uppercase}
.top-rated{background:var(--gold);color:#000;box-shadow:0 0 15px rgba(255,215,0,.4)}
.card.is-top-rated{border-color:rgba(255,215,0,.4);background:linear-gradient(180deg,#151a14 0,var(--d) 100%)}
.card.is-top-rated:hover{border-color:var(--gold);box-shadow:0 15px 40px rgba(255,215,0,.15)}
.level-2{background:var(--cyn);color:#000}
.card.is-level-2{border-color:rgba(0,242,255,.25)}
.card.is-level-2:hover{border-color:var(--cyn)}
.level-1{background:var(--purp);color:#fff}
.card.is-level-1{border-color:rgba(188,19,254,.25)}
.card.is-level-1:hover{border-color:var(--purp)}
.new-seller{background:var(--g);color:#000}
.card.is-new-seller{border-color:rgba(0,255,136,.15)}
.card.is-new-seller:hover{border-color:var(--g)}
.i{padding:20px;display:flex;flex-direction:column;flex-grow:1}
h2{font-size:clamp(1.4rem,3vw,1.6rem);font-weight:900;color:var(--w);line-height:1.2}
.id{font-size:.85rem;font-weight:700;color:var(--g);letter-spacing:2px;margin:5px 0 10px}
.rating{display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:15px}
.rating i{color:var(--gold);font-size:.9rem}
.rating span{color:var(--gray);font-size:.85rem;font-weight:600}
.v{position:relative;border-radius:14px;overflow:hidden;background:#000;height:0;padding-bottom:56.25%;cursor:pointer;margin-bottom:15px;border:1px solid rgba(255,255,255,.05)}
.v img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .4s}
.p{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;background:rgba(0,255,136,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#000;z-index:2;transition:.3s}
.v:hover .p{transform:translate(-50%,-50%) scale(1.1);background:var(--g);box-shadow:0 0 20px rgba(0,255,136,.5)}
.v.playing .p,.v.playing img{opacity:0;pointer-events:none}
.v iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.b{display:flex;flex-direction:column;gap:10px;margin-top:auto}
.top-buttons{display:flex;gap:10px}
.top-buttons a{flex:1;padding:10px;border-radius:12px;background:#161d26;border:1px solid var(--bdr);color:var(--gray);font-size:.8rem;font-weight:800;text-align:center;text-decoration:none;letter-spacing:1px;transition:.3s}
.top-buttons a:hover{background:#1f2937;color:var(--w);border-color:var(--gray)}
.wa{background:linear-gradient(90deg,#00b359,var(--g));color:#000;font-size:.95rem;font-weight:900;text-align:center;text-decoration:none;padding:12px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:1px;transition:.3s}
.wa i{font-size:1.4rem}
.wa:hover{box-shadow:0 0 20px rgba(0,255,136,.4);filter:brightness(1.1);transform:translateY(-2px)}
@media(max-width:768px){
  #g{grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px}
  .top-buttons{flex-direction:column}
  .guide-box{flex-direction:column;align-items:center;text-align:center;gap:10px}
}
</style>
</head>
<body>

    {name:"Esha Dastogir",gender:"male",rating:4.7,video:"Li8eFwJb1Hs",demo:"1orMJw-7pz_Kj_3Fkg-uXBBUyGIJWcxsl"},
    {name:"Arif Rabbani Rakib",gender:"male",rating:4.8,video:"3LSx1FpT_8E",demo:"1F80CYa9Gbj66q6fTHoLGatfZIX8B7gqs"},

    {name:"Rafiul Islam Rishad",gender:"male",rating:4.7,video:"LzbXCNqMKeE",demo:"https://www.instagram.com/rishad_the_sufi_vai"},
    {name:"Abdul Ahad",gender:"male",rating:4.6,video:"rocEY56yC5g",demo:"1nLjKZZNEm-0nTjVAvWZc5NgEfEyjcbdh"},
    {name:"Maha",gender:"female",rating:4.8,video:"A7bZFKO7Gr4",demo:"https://www.facebook.com/share/16ypBJH5R3/"},
    {name:"Srabon Ahmed Sani",gender:"male",rating:4.9,video:"KQ7z5MBU52w",demo:"1fs2JJYuNrASWGmk0aQuqJxYO4V8UasRO"},
    {name:"Mainur Afrose Dipa",gender:"female",rating:5.0,video:"vJ5m6QEbbLQ",demo:"https://youtube.com/shorts/vJ5m6QEbbLQ"},
    {name:"Sabiha Rahman Ruponti",gender:"female",rating:3.0,video:"fu0hNUgszDs",demo:"1KLbIhdIUlye9da1-z-j561oN4xIEnON0"},
    {name:"Urmi Islam",gender:"female",rating:5.0,video:"NE5MmC8I6WU",demo:"1dWGnPoH8-hD7j3m3IG0ylpVg-PWzshEr"},
    {name:"Reya Rahman",gender:"female",rating:5.0,video:"Cu-zf5LBufE",demo:"1B-bH2UuGNrrJUre5CHHyDLaeZu4QWnCZ"},
    {name:"Abu Sayeed Mohammad Nafi",gender:"male",rating:5.0,video:"3Cm09r56Agk",demo:"1aIja5oaEIufZR7MtDyY7vkP19caNwTVQ"},
    {name:"Asraf Ahmed",gender:"male",rating:4.5,video:"9qgSl0r9S8g",demo:"https://youtube.com/shorts/9qgSl0r9S8g?si=5H-oRR2YmaUT5MyY"},
    {name:"Sabrina Tanjin Tanfe",gender:"female",rating:4.5,video:"uxgug5hB3Yc",demo:"https://www.facebook.com/share/1DumLiQoqD/?mibextid=wwXIfr"},
    {name:"Md Usman Gani",gender:"male",rating:5.0,video:"Iz-hK6N95EM",demo:"https://www.youtube.com/@MD.USMAN_GANI"}
  ];

  const premiumNames = new Set(["RJ Opu", "Abu Sayeed Mohammad Nafi", "Ashik Ahamed", "Sheikh Nusrat Priya", "Niyaz Afridi", "Moumita Debnath", "Fahad Abdullah Al Azad", "Nahar Barna", "Tahsin Hossain Rahi", "Raika Rowshan Oishy", "Habiba", "Eshrat Jahan Disha", "Reya Rahman", "Md Usman Gani"]);

  rawPromoters.forEach(p => { p.isTopRanked = premiumNames.has(p.name); });

  rawPromoters.sort((a, b) => {
    const pushToEnd = ["Asraf Ahmed", "Sabrina Tanjin Tanfe"];
    const aToEnd = pushToEnd.indexOf(a.name);
    const bToEnd = pushToEnd.indexOf(b.name);
    if (aToEnd !== -1 && bToEnd !== -1) return aToEnd - bToEnd;
    if (aToEnd !== -1) return 1;
    if (bToEnd !== -1) return -1;

    const forcedOrder = ["RJ Opu", "Abu Sayeed Mohammad Nafi", "Ashik Ahamed"];
    const aIndex = forcedOrder.indexOf(a.name);
    const bIndex = forcedOrder.indexOf(b.name);

    if (aIndex !== -1 && bIndex !== -1) return aIndex - bIndex;
    if (aIndex !== -1) return -1;
    if (bIndex !== -1) return 1;
    if (b.isTopRanked !== a.isTopRanked) return b.isTopRanked - a.isTopRanked;
    return b.rating - a.rating;
  });

  rawPromoters.forEach((p, index) => {
    let rank = index + 1;
    p.id = "MG-BP-" + String(rank).padStart(2, '0');
    if (rank <= 14) { p.badgeText = "TOP RATED"; p.badgeClass = "top-rated"; } 
    else if (rank <= 24) { p.badgeText = "LEVEL 2 SELLER"; p.badgeClass = "level-2"; } 
    else if (rank <= 34) { p.badgeText = "LEVEL 1 SELLER"; p.badgeClass = "level-1"; } 
    else { p.badgeText = "NEW SELLER"; p.badgeClass = "new-seller"; }
  });

  const g = document.getElementById('g');
  const searchInput = document.getElementById('s');
  let currentFilter = 'all';

  function renderStars(r){
    let s = '';
    for(let i=1;i<=5;i++) s += i<=r ? '<i class="fas fa-star"></i>' : (i-0.5===r ? '<i class="fas fa-star-half-alt"></i>' : '<i class="far fa-star"></i>');
    return s;
  }

  function render(){
    // Use requestAnimationFrame to avoid blocking the main thread during render
    requestAnimationFrame(() => {
      const q = searchInput.value.toLowerCase();
      const filtered = rawPromoters.filter(p => 
        (p.name.toLowerCase().includes(q) || p.id.toLowerCase().includes(q)) && 
        (currentFilter === 'all' || p.badgeClass === currentFilter || p.gender === currentFilter)
      );
      
      g.innerHTML = filtered.map(p => {
        const msg = encodeURIComponent(`Hello Multimedia Gen!\nI would like to get a quote for booking:\nModel: ${p.name} (${p.id})\n\nPlease share the pricing and package details. Thank you!`);
        const wa = `https://wa.me/8801915706375?text=${msg}`;
        const demoLink = p.demo.startsWith('http') ? p.demo : `https://drive.google.com/drive/folders/${p.demo}`;
        
        // OPTIMIZATION: Converted image to WebP (vi_webp instead of vi) and added loading/decoding attrs + width/height for CLS
        return `<div class="card is-${p.badgeClass}">
          <div class="i">
            <div class="badge ${p.badgeClass}">${p.badgeText}</div>
            <h2>${p.name}</h2>
            <div class="id">${p.id}</div>
            <div class="rating">${renderStars(p.rating)} <span>${p.rating.toFixed(1)}</span></div>
            <div class="v" onclick="window.playVideo(this,'${p.video}')">
              <img src="https://i.ytimg.com/vi_webp/${p.video}/hqdefault.webp" loading="lazy" decoding="async" width="320" height="180" alt="${p.name}">
              <div class="p"><i class="fas fa-play"></i></div>
            </div>
            <div class="b">
              <div class="top-buttons">
                <a href="${demoLink}" target="_blank" rel="noopener">PORTFOLIO</a>
                <a href="https://multimediagen.com/order/" target="_blank" rel="noopener">ORDER NOW</a>
              </div>
              <a href="${wa}" target="_blank" rel="noopener" class="wa"><i class="fab fa-whatsapp"></i> GET A QUOTE</a>
            </div>
          </div>
        </div>`;
      }).join('');
    });
  }

  // Exposed globally for inline onclick
  window.playVideo = function(el, id){
    const isPlaying = el.classList.contains('playing');
    document.querySelectorAll('.v.playing').forEach(v => {
      v.classList.remove('playing');
      const iframe = v.querySelector('iframe');
      if(iframe) iframe.remove();
    });
      
    if(!isPlaying){
      const iframe = document.createElement('iframe');
      iframe.setAttribute('allow', 'autoplay; fullscreen; accelerometer; gyroscope; picture-in-picture');
      iframe.setAttribute('allowfullscreen', '');
      iframe.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&playsinline=1`;
      el.appendChild(iframe);
      el.classList.add('playing');
    }
  }

  // Event Listeners
  document.querySelectorAll('.f button').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.f button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentFilter = b.dataset.f;
    render();
  }));

  searchInput.addEventListener('input', render);
  
  // Initial render
  render();
})();
</script>
</body>
</html>
