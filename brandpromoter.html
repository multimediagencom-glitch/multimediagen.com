    <style>
        /* Custom Styles for Glassmorphism and Animations */
        .glass-header {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-footer {
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.95) 0%, rgba(2, 6, 23, 1) 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Subtle ambient glow for footer */
        .glass-footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(16, 185, 129, 0.5), transparent);
        }

        .glass-footer::after {
            content: '';
            position: absolute;
            top: -100px;
            left: 10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .nav-link {
            position: relative;
            color: #cbd5e1;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #10b981; /* Emerald 500 */
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: #10b981;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Mobile Menu Animation */
        #mobile-menu {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }

        #mobile-menu.open {
            max-height: 500px; /* Adjust based on content */
            opacity: 1;
        }

        /* Footer specific animations */
        .footer-link {
            transition: all 0.3s ease;
            display: inline-block;
        }
        .footer-link:hover {
            color: #10b981;
            transform: translateX(5px);
        }
        
        .social-icon {
            transition: all 0.3s ease;
        }
        .social-icon:hover {
            color: #10b981;
            transform: translateY(-3px);
        }

        /* Base body styles for the dark theme */
        body {

            flex-direction: column;
        }
        
        main {

            padding: 80px 20px; /* Space for fixed header */
            text-align: center;
        }
    </style>

        // --- 2. Injection Logic ---
        function loadComponents() {
            // Inject Header
            const headerPlaceholder = document.getElementById('header-placeholder');
            if (headerPlaceholder) {
                headerPlaceholder.innerHTML = HeaderComponent;
                initializeHeaderScripts();
            }

            // Inject Footer
            const footerPlaceholder = document.getElementById('footer-placeholder');
            if (footerPlaceholder) {
                footerPlaceholder.innerHTML = FooterComponent;
            }
            
            // Mark active nav link based on current URL
            setActiveNavLink();
        }

        // --- 3. Interactive Scripts (Header) ---
        function initializeHeaderScripts() {
            const btn = document.getElementById('mobile-menu-button');
            const menu = document.getElementById('mobile-menu');
            const iconPath = document.getElementById('menu-icon-path');

            if (btn && menu) {
                btn.addEventListener('click', () => {
                    menu.classList.toggle('open');
                    // Toggle icon between hamburger and X
                    if (menu.classList.contains('open')) {
                        iconPath.setAttribute('d', 'M6 18L18 6M6 6l12 12');
                    } else {
                        iconPath.setAttribute('d', 'M4 6h16M4 12h16M4 18h16');
                    }
                });
            }

            // Add scroll effect for header
            window.addEventListener('scroll', () => {
                const header = document.querySelector('header');
                if (window.scrollY > 10) {
                    header.classList.add('shadow-lg', 'bg-slate-900/90');
                    header.classList.remove('bg-slate-900/40');
                } else {
                    header.classList.remove('shadow-lg', 'bg-slate-900/90');
                    header.classList.add('bg-slate-900/40');
                }
            });
        }
        
        // --- 4. Active Link Logic ---
        function setActiveNavLink() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link, #mobile-menu a');
            
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                // Basic exact match or root match
                if (currentPath === href || (currentPath === '/' && href === '/')) {
                    link.classList.add('text-emerald-400', 'font-semibold');
                    link.classList.remove('text-slate-300', 'text-sm', 'font-medium'); // Adjust based on original classes
                }
            });
        }

        // Initialize on DOM Load
        document.addEventListener('DOMContentLoaded', loadComponents);
